name: CAP CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4   # ✅ updated

      - name: Setup Node.js
        uses: actions/setup-node@v4  # ✅ updated
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Build CAP Project
        run: npx cds build

      - name: Run Tests
        run: npm test || echo "No tests found"
        
